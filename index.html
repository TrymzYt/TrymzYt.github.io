<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LO-CINEMA — Weekprogramma</title>
<style>
:root {
  --bg-1: #02040f;
  --bg-2: #060c2b;
  --accent: #3b82f6;
  --accent-bright: #60a5fa;
  --accent-glow: #93c5fd;
  --card-bg: #0c1530;
  --card-border: #1e3a8a;
  --text-main: #e5edff;
  --text-dim: #94a3c4;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
  background: radial-gradient(ellipse at top, var(--bg-2) 0%, var(--bg-1) 70%);
  color: var(--text-main);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ---------- HEADER ---------- */
.topbar {
  text-align: center;
  padding: 36px 16px 24px;
  border-bottom: 1px solid rgba(59,130,246,0.25);
  background: linear-gradient(180deg, rgba(59,130,246,0.08), transparent);
}

.logo {
  font-size: 2.6rem;
  font-weight: 800;
  letter-spacing: 4px;
  text-transform: uppercase;
}

.logo-lo {
  color: var(--accent-bright);
  text-shadow: 0 0 18px var(--accent), 0 0 40px var(--accent);
}

.logo-cinema {
  color: var(--text-main);
  margin-left: 6px;
}

.week-info h1 {
  margin: 14px 0 4px;
  font-size: 1.4rem;
  font-weight: 600;
  color: var(--accent-bright);
}

.week-info p {
  margin: 0;
  color: var(--text-dim);
  font-size: 0.95rem;
  letter-spacing: 2px;
}

.legend {
  display: flex;
  justify-content: center;
  gap: 22px;
  margin-top: 14px;
  flex-wrap: wrap;
}

.legend-item {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  font-size: 0.8rem;
  color: var(--text-dim);
  letter-spacing: 0.5px;
}

.legend-dot {
  display: inline-block;
  width: 12px;
  height: 12px;
  border-radius: 50%;
}

.legend-dot-elapsed {
  background: rgba(255,255,255,0.25);
  border: 1px solid var(--text-dim);
}

.legend-dot-upcoming {
  background: var(--accent-bright);
  box-shadow: 0 0 8px var(--accent);
}

/* ---------- GRID ---------- */
main {
  flex: 1;
  padding: 32px 16px 16px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 22px;
  max-width: 1200px;
  margin: 0 auto;
}

.day-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 14px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
}

.day-card.has-movie {
  cursor: pointer;
}

.day-card.has-movie:hover {
  transform: translateY(-6px);
  box-shadow: 0 12px 28px rgba(59,130,246,0.35);
  border-color: var(--accent-bright);
}

.day-header {
  padding: 10px 12px;
  text-align: center;
  background: rgba(59,130,246,0.12);
  border-bottom: 1px solid var(--card-border);
}

.day-name {
  display: block;
  font-weight: 700;
  font-size: 0.95rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--accent-bright);
}

.day-date {
  display: block;
  font-size: 0.8rem;
  color: var(--text-dim);
  margin-top: 2px;
}

.poster-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 2/3;
  background: #050a1c;
  overflow: hidden;
}

.poster-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.3s ease, filter 0.3s ease;
}

.day-card.has-movie:hover .poster-wrap img {
  transform: scale(1.05);
}

.status-badge {
  position: absolute;
  top: 8px;
  right: 8px;
  font-size: 0.7rem;
  font-weight: 700;
  padding: 4px 9px;
  border-radius: 20px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.status-elapsed {
  background: rgba(0,0,0,0.65);
  color: var(--text-dim);
  border: 1px solid var(--text-dim);
}

.status-upcoming {
  background: rgba(59,130,246,0.85);
  color: white;
  border: 1px solid var(--accent-glow);
}

.day-card.elapsed {
  opacity: 0.55;
  border-color: var(--card-border);
}

.day-card.elapsed:hover {
  opacity: 0.85;
}

.day-card.elapsed .poster-wrap img {
  filter: grayscale(80%) brightness(0.5);
}

.day-card.elapsed .movie-title {
  color: var(--text-dim);
}

.day-card.upcoming {
  border-color: var(--accent-bright);
  box-shadow: 0 0 16px rgba(59,130,246,0.25);
}

.played-stamp {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(-18deg);
  border: 3px solid var(--text-dim);
  color: var(--text-dim);
  font-weight: 800;
  font-size: 1.1rem;
  letter-spacing: 4px;
  text-transform: uppercase;
  padding: 6px 14px;
  border-radius: 6px;
  background: rgba(2,4,15,0.45);
  white-space: nowrap;
  pointer-events: none;
}

.movie-info {
  padding: 10px 12px 14px;
  text-align: center;
}

.movie-title {
  margin: 0;
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--text-main);
  line-height: 1.25;
}

.tap-hint {
  display: block;
  margin-top: 4px;
  font-size: 0.7rem;
  color: var(--accent-bright);
  letter-spacing: 1px;
}

/* Geen vertoning kaart */
.day-card.no-screening {
  align-items: center;
  justify-content: center;
  min-height: 320px;
}

.no-screening .poster-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  background: repeating-linear-gradient(
    135deg,
    rgba(59,130,246,0.06) 0px,
    rgba(59,130,246,0.06) 12px,
    transparent 12px,
    transparent 24px
  );
}

.no-screening-label {
  color: var(--text-dim);
  font-size: 0.85rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  text-align: center;
  padding: 0 10px;
}

.no-screening-label .icon {
  display: block;
  font-size: 2rem;
  margin-bottom: 8px;
  opacity: 0.5;
}

/* ---------- MODAL (info popup) ---------- */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(2,4,15,0.85);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 20px;
}

.modal-overlay.open {
  display: flex;
}

.modal {
  background: var(--card-bg);
  border: 1px solid var(--accent);
  border-radius: 16px;
  max-width: 700px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  position: relative;
  box-shadow: 0 0 60px rgba(59,130,246,0.4);
}

.modal-close {
  position: absolute;
  top: 10px;
  right: 14px;
  background: none;
  border: none;
  color: var(--text-main);
  font-size: 1.8rem;
  cursor: pointer;
  z-index: 2;
  line-height: 1;
}

.modal-close:hover {
  color: var(--accent-bright);
}

.modal-content {
  display: flex;
  flex-direction: column;
}

@media (min-width: 600px) {
  .modal-content {
    flex-direction: row;
  }
  .modal-poster {
    width: 260px;
    flex-shrink: 0;
  }
}

.modal-poster {
  width: 100%;
  display: block;
  object-fit: cover;
  border-radius: 16px 16px 0 0;
}

@media (min-width: 600px) {
  .modal-poster {
    border-radius: 16px 0 0 16px;
  }
}

.modal-info {
  padding: 24px 28px;
}

.modal-badge {
  display: inline-block;
  background: var(--accent);
  color: white;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 20px;
  margin-bottom: 10px;
}

.modal-info h2 {
  margin: 0 0 6px;
  color: var(--accent-bright);
}

.modal-meta {
  color: var(--text-dim);
  font-size: 0.85rem;
  margin: 0 0 14px;
  letter-spacing: 0.5px;
}

.modal-overview {
  line-height: 1.5;
  margin: 0 0 14px;
}

.modal-when {
  font-weight: 600;
  color: var(--accent-bright);
  margin: 0;
}

/* ---------- FOOTER ---------- */
.footer {
  text-align: center;
  padding: 28px 16px 36px;
  border-top: 1px solid rgba(59,130,246,0.2);
}

.cinema-badges {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: center;
  gap: 16px;
}

.atmos-badge {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  padding: 8px 26px;
  border: 2px solid var(--accent-bright);
  border-radius: 8px;
  background: linear-gradient(180deg, rgba(59,130,246,0.15), transparent);
}

.atmos-text {
  font-weight: 800;
  font-size: 1.3rem;
  letter-spacing: 6px;
  color: var(--accent-bright);
  text-shadow: 0 0 12px var(--accent);
}

.atmos-sub {
  font-size: 0.6rem;
  letter-spacing: 2px;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-top: 2px;
}

.uhd-badge {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  padding: 6px 22px;
  border: 2px solid var(--accent-bright);
  border-radius: 8px;
  background: linear-gradient(180deg, transparent, rgba(59,130,246,0.15));
}

.uhd-text {
  font-weight: 900;
  font-size: 1.4rem;
  letter-spacing: 3px;
  color: white;
  text-shadow: 0 0 12px var(--accent);
}

.uhd-sub {
  font-size: 0.6rem;
  letter-spacing: 3px;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-top: 2px;
}
</style>
</head>
<body>

<header class="topbar">
  <div class="logo">
    <span class="logo-lo">LO</span><span class="logo-cinema">CINEMA</span>
  </div>
  <div class="week-info">
    <h1 id="weekTitle">Movie Week 1</h1>
    <p id="weekRange">12/07 — 19/07</p>
  </div>
  <div class="legend">
    <span class="legend-item"><span class="legend-dot legend-dot-elapsed"></span>Al gespeeld</span>
    <span class="legend-item"><span class="legend-dot legend-dot-upcoming"></span>Nog te zien</span>
  </div>
</header>

<main>
  <section class="grid" id="movieGrid">
    <!-- dagen worden hier automatisch ingevoegd -->
  </section>
</main>

<footer class="footer">
  <div class="cinema-badges">
    <div class="atmos-badge">
      <span class="atmos-text">LO·ATMOS</span>
      <span class="atmos-sub">immersive bedroom sound&trade;</span>
    </div>
    <div class="uhd-badge">
      <span class="uhd-text">4K</span>
      <span class="uhd-sub">Ultra HD</span>
    </div>
  </div>
</footer>

<!-- Info popup -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose">&times;</button>
    <div class="modal-content">
      <img class="modal-poster" id="modalPoster" src="" alt="">
      <div class="modal-info">
        <span class="modal-badge" id="modalBadge"></span>
        <h2 id="modalTitle"></h2>
        <p class="modal-meta" id="modalMeta"></p>
        <p class="modal-overview" id="modalOverview"></p>
        <p class="modal-when" id="modalWhen"></p>
      </div>
    </div>
  </div>
</div>

program.days.forEach(day => {
  const card = document.createElement("div");
  card.classList.add("day-card");

  if (day.status === "none" || !day.movie) {
    card.classList.add("no-screening");
    card.innerHTML = `
      <div class="day-header">
        <span class="day-name">${day.day}</span>
        <span class="day-date">${day.date}</span>
      </div>
      <div class="poster-wrap">
        <div class="no-screening-label">
          <span class="icon">🍿</span>
          Geen vertoning
        </div>
      </div>
    `;
  } else {
    const movie = day.movie;
    card.classList.add("has-movie");
    if (day.status === "elapsed") card.classList.add("elapsed");
    if (day.status === "upcoming") card.classList.add("upcoming");

    const badgeClass = day.status === "elapsed" ? "status-elapsed" : "status-upcoming";
    const badgeText = day.status === "elapsed" ? "Gespeeld" : "Binnenkort";
    const stamp = day.status === "elapsed" ? `<span class="played-stamp">Gespeeld</span>` : "";

    card.innerHTML = `
      <div class="day-header">
        <span class="day-name">${day.day}</span>
        <span class="day-date">${day.date}</span>
      </div>
      <div class="poster-wrap">
        <img src="${movie.poster}" alt="${movie.title}">
        <span class="status-badge ${badgeClass}">${badgeText}</span>
        ${stamp}
      </div>
      <div class="movie-info">
        <p class="movie-title">${movie.title}</p>
        <span class="tap-hint">Tap voor info</span>
      </div>
    `;

    card.addEventListener("click", () => openModal(day));
  }

  grid.appendChild(card);
});

// ---------- Info popup ----------
const overlay = document.getElementById("modalOverlay");
const modalPoster = document.getElementById("modalPoster");
const modalTitle = document.getElementById("modalTitle");
const modalMeta = document.getElementById("modalMeta");
const modalOverview = document.getElementById("modalOverview");
const modalWhen = document.getElementById("modalWhen");
const modalBadge = document.getElementById("modalBadge");
const modalClose = document.getElementById("modalClose");

function openModal(day) {
  const movie = day.movie;
  modalPoster.src = movie.poster;
  modalPoster.alt = movie.title;
  modalTitle.textContent = movie.title;
  modalMeta.textContent = `${movie.year} · ${movie.genre} · ${movie.runtime} · ${movie.rating}`;
  modalOverview.textContent = movie.overview;
  modalWhen.textContent = `${day.day} ${day.date} — ${day.status === "elapsed" ? "al gespeeld" : "deze week"}`;
  modalBadge.textContent = day.status === "elapsed" ? "Gespeeld" : "Binnenkort in LO-CINEMA";
  overlay.classList.add("open");
}

function closeModal() {
  overlay.classList.remove("open");
}

modalClose.addEventListener("click", closeModal);
overlay.addEventListener("click", (e) => {
  if (e.target === overlay) closeModal();
});
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeModal();
});
</script>
</body>
</html>
